<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spy-Look · 模型能力测试</title>
  <link rel="stylesheet" href="/css/model-capability-probe.css" />
</head>
<body>
  <div class="page">
    <div class="masthead">
      <div>
        <p class="kicker">Editorial Ops Desk</p>
        <h1>模型能力测试</h1>
        <p class="muted">对 OpenAI 兼容上游发起真实 Chat 请求，探测基础对话、工具调用、结构化输出与思考模式。</p>
      </div>
      <div class="actions">
        <a class="nav" href="/">← 返回应用列表</a>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>探测配置</h2>
      </div>
      <p class="muted warn-note">将向上游发起多轮 HTTP 请求，可能消耗配额；单次探测通常需数十秒至数分钟。</p>

      <div class="mode-tabs">
        <label class="mode-tab">
          <input type="radio" name="probeMode" value="upstream" checked onchange="onModeChange()" />
          选择上游
        </label>
        <label class="mode-tab">
          <input type="radio" name="probeMode" value="custom" onchange="onModeChange()" />
          自定义连接
        </label>
      </div>

      <div id="upstreamFields" class="form-grid">
        <label>
          <span>上游</span>
          <select id="upstreamSelect" onchange="onUpstreamChange()">
            <option value="">加载中…</option>
          </select>
        </label>
        <label>
          <span>模型</span>
          <select id="modelSelect" disabled>
            <option value="">请先选择上游</option>
          </select>
        </label>
      </div>

      <div id="customFields" class="form-grid hidden">
        <label class="full">
          <span>API 地址 (uri)</span>
          <input id="customUri" type="text" placeholder="https://api.example.com/v1" oninput="onCustomCredentialsChange()" />
        </label>
        <label class="full">
          <span>API Key</span>
          <input id="customApiKey" type="password" placeholder="sk-..." autocomplete="off" oninput="onCustomCredentialsChange()" />
        </label>
        <label class="full">
          <span>模型</span>
          <select id="customModelSelect" disabled>
            <option value="">请先填写 API 地址与 Key</option>
          </select>
        </label>
      </div>

      <div class="form-actions">
        <button class="primary" id="probeBtn" type="button" onclick="runProbe()">开始探测</button>
        <span id="probeStatus" class="status-text"></span>
      </div>
    </div>

    <div id="reportPanel" class="panel report-panel hidden">
      <div class="report-header">
        <div>
          <p class="report-kicker">Capability Report</p>
          <h2>探测报告</h2>
        </div>
        <div id="reportSummaryBadge" class="report-summary-badge"></div>
      </div>
      <div id="reportProgress" class="report-progress"></div>
      <div id="reportMeta" class="report-meta"></div>
      <div id="reportCards" class="report-cards"></div>
      <div id="reportSummary" class="report-summary"></div>
    </div>
  </div>
  <script src="/js/model-capability-probe.js"></script>
</body>
</html>
